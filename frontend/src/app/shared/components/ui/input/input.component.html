<div class="flex flex-col gap-2 w-full">
  @if (label()) {
    <label class="text-sm font-semibold text-gray-700 flex items-center gap-1">
      {{ label() }}
      @if (required()) {
        <span class="text-red-600">*</span>
      }
    </label>
  }

  <input
    #inputRef
    [type]="type()"
    [value]="displayValue()"
    (input)="onValueChange($event)"
    (blur)="onBlur()"
    [placeholder]="placeholder()"
    [disabled]="isDisabled()"
    [attr.maxlength]="maxLength()"
    [min]="min()"
    [max]="max()"
    [step]="step()"
    [attr.pattern]="pattern() ? pattern() : null"
    [attr.inputmode]="inputmode()"
    class="w-full px-3 py-2.5 border border-gray-300 rounded-md text-sm font-inherit transition-all bg-white text-gray-900 focus:outline-none focus:border-orange-600 focus:ring-3 focus:ring-orange-100 disabled:bg-gray-100 disabled:cursor-not-allowed disabled:opacity-60"
    [class.border-red-500]="showError()"
    [class.bg-red-50]="showError()"
    [class.focus:border-red-500]="showError()"
    [class.focus:ring-red-100]="showError()"
  />

  @if (showError()) {
    <span class="text-xs text-red-600 -mt-1">{{ errorMessage() }}</span>
  }
</div>
