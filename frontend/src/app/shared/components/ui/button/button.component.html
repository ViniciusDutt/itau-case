<button
  [type]="type()"
  [disabled]="disabled()"
  [class]="class()"
  [ngClass]="{
    'px-4 py-2 text-nowrap rounded font-bold cursor-pointer transition flex items-center justify-center gap-2': true,
    'bg-primary text-white hover:bg-primary/80': variant() === 'default',
    'border border-primary text-primary! hover:bg-primary/10':
      variant() === 'outline' && !disabled(),
    'text-primary hover:bg-primary/10': variant() === 'ghost' && !disabled(),
    'opacity-50 cursor-not-allowed': disabled(),
  }"
>
  <ng-content></ng-content>
</button>
