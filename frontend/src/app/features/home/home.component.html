<section class="space-y-6 p-6 max-w-7xl mx-auto">
  <div class="flex items-center gap-6">
    <h1 class="text-2xl font-bold text-secondary lg:text-nowrap">
      Resumo Patrimonial
    </h1>
    <hr class="border-primary w-full" />
  </div>

  @if (error()) {
    <div class="bg-red-100 text-red-800 p-3 rounded border border-red-300 mb-4">
      {{ error() }}
    </div>
  }

  @if (loading()) {
    <div class="grid grid-cols-1 md:grid-cols-3 gap-5">
      <app-summary-card-skeleton />
      <app-summary-card-skeleton />
      <app-summary-card-skeleton />
    </div>
  } @else if (summary()) {
    <div class="space-y-5">
      <div class="grid grid-cols-1 md:grid-cols-3 gap-5">
        <app-summary-card
          title="Patrimônio Total"
          [value]="summary()?.totalPatrimonio || 0"
          [isCurrency]="true"
        />
        <app-summary-card
          title="Total de Fundos"
          [value]="summary()?.totalRows || 0"
        />
        <app-summary-card
          title="Categorias"
          [value]="summary()?.totalCategories || 0"
        />
      </div>
      <app-button routerLink="/ativos"> Ver carteira de ativos </app-button>
    </div>
  }
</section>
