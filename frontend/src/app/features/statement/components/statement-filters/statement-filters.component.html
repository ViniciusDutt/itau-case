<div class="bg-white p-6 border rounded-xl border-border mb-8">
  <form
    [formGroup]="filterForm"
    (ngSubmit)="onSubmit()"
    class="flex flex-col md:flex-row md:justify-between gap-6 items-start md:items-end"
  >
    <div class="w-full flex flex-col md:flex-row items-end gap-4">
      <app-input
        formControlName="nome"
        type="text"
        label="Nome da Empresa"
        placeholder="Ex: Itaú Unibanco"
        [showError]="
          (filterForm.get('nome')?.touched ?? false) &&
          (filterForm.get('nome')?.invalid ?? false)
        "
        errorMessage="Mínimo de 3 caracteres."
        class="w-full lg:w-auto"
      ></app-input>

      <app-select
        formControlName="codigoTipo"
        (change)="onSubmit()"
        [options]="fundTypeOptionsWithDefault()"
        placeholder="Selecione um tipo de fundo"
        label="Tipo de Fundo"
        class="w-full lg:w-auto"
      ></app-select>
      <div></div>
      <app-button
        type="button"
        variant="outline"
        (click)="onClear()"
        class="w-full lg:w-auto"
      >
        Limpar
      </app-button>

      <app-button
        type="submit"
        [disabled]="filterForm.invalid || isLoading()"
        class="w-full lg:w-auto"
      >
        @if (isLoading()) {
          Buscando...
        } @else {
          Filtrar
        }
      </app-button>
    </div>

    <div class="flex items-center gap-3 w-full md:w-auto">
      <app-button
        type="button"
        variant="ghost"
        (click)="onNewClick()"
        class="w-full lg:w-auto"
      >
        + Novo
      </app-button>
    </div>
  </form>
</div>
