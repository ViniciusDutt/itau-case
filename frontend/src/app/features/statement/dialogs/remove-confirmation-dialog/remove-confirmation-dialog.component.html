<div class="flex flex-col gap-4">
  <div class="flex items-start gap-4">
    <div class="flex-1">
      <p class="text-sm text-gray-600 mt-2">
        Tem certeza que deseja remover a transação?
      </p>
      @if (transaction()) {
        <div class="mt-4 p-3 bg-gray-50 rounded-lg border border-gray-200">
          <div class="text-sm">
            <p class="text-gray-700">
              <span class="font-semibold">Código:</span>
              {{ transaction()!.codigo }}
            </p>
            <p class="text-gray-700">
              <span class="font-semibold">Empresa:</span>
              {{ transaction()!.nome }}
            </p>
          </div>
        </div>
      }
      <p class="text-xs text-red-600 mt-3">Esta ação não pode ser desfeita.</p>
    </div>
  </div>

  <div class="flex gap-3 mt-6 pt-6 border-t border-gray-200">
    <button
      type="button"
      (click)="onCancel()"
      class="flex-1 px-4 py-2.5 bg-gray-200 text-gray-700 rounded-md font-semibold text-sm cursor-pointer transition-all hover:bg-gray-300"
    >
      Cancelar
    </button>
    <button
      type="button"
      (click)="onConfirm()"
      class="flex-1 px-4 py-2.5 bg-red-600 text-white rounded-md font-semibold text-sm cursor-pointer transition-all hover:bg-red-700"
    >
      Remover
    </button>
  </div>
</div>
